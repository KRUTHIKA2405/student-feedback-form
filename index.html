<div class="container">
    <h2>Student Feedback</h2>
    <p class="subtitle">We value your input to improve our campus.</p>
    
    <form id="feedbackForm">
        <label for="name">Full Name</label>
        <input type="text" id="name" placeholder="e.g. Kruthika Agarwal" required>

        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="name@college.edu" required>

        <label for="mobile">Mobile Number</label>
        <input type="text" id="mobile" placeholder="10-digit number" required>

        <label for="department">Department</label>
        <select id="department">
            <option value="">Choose Department...</option>
            <option value="CS">Computer Science</option>
            <option value="IT">Information Technology</option>
        </select>

        <label>Gender</label>
        <div class="gender-group">
            <span><input type="radio" name="gender" value="Male"> Male</span>
            <span><input type="radio" name="gender" value="Female"> Female</span>
        </div>

        <label for="comments">Feedback Comments</label>
        <textarea id="comments" placeholder="Describe your experience (min 10 words)..."></textarea>
        
        <div class="button-group">
            <button type="submit">Submit Feedback</button>
            <button type="reset">Clear</button>
        </div>
    </form>
    <p id="successMsg" style="color: #4ade80; display: none; text-align: center; margin-top: 20px;">✓ Feedback sent successfully!</p>
</div>
